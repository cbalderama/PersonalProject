name: CI

on:
  push:
    branches: ["*"]        # runs on every branch push
  pull_request:
    branches: ["main"]     # runs on every PR targeting main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Type Check
        run: npm run typecheck

      - name: Run Tests
        run: npm test -- --watchAll=false --passWithNoTests