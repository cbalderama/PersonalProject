sonar.projectKey=cbalderama_PersonalProject
sonar.organization=cbalderama

# Source and test directories
sonar.sources=apps/mobile/app,apps/mobile/components,apps/mobile/services,apps/mobile/types
sonar.tests=apps/mobile/__tests__,apps/mobile/services/__tests__

# Exclude files that shouldn't be analyzed
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.spec.ts,**/scripts/**,**/__mocks__/**,**/coverage/**,**/.expo/**,**/android/**,**/ios/**,**/dist/**

# Files to exclude from coverage calculation
sonar.coverage.exclusions=**/scripts/**,**/*.test.ts,**/*.spec.ts,**/app.json,**/eas.json,**/babel.config.js,**/metro.config.js,**/__mocks__/**

# Language
sonar.language=ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Quality Gate - MVP Standards (Realistic for new projects)
# Start at 50% coverage, increase gradually
sonar.coverage.minimum=50.0

# Allow up to 5% duplication for MVP
sonar.duplication.maximum=5.0

# Stricter standards for NEW code going forward
sonar.new_code_period=previous_version
sonar.newCode.coverage.minimum=60.0
sonar.newCode.duplication.maximum=3.0

# Severity thresholds
sonar.qualitygate.wait=true

# Project metadata
sonar.projectName=PersonalProject
sonar.projectVersion=1.0.0
sonar.links.homepage=https://github.com/cbalderama/PersonalProject
sonar.links.ci=https://github.com/cbalderama/PersonalProject/actions
sonar.links.scm=https://github.com/cbalderama/PersonalProject
sonar.links.issue=https://github.com/cbalderama/PersonalProject/issues