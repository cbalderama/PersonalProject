sonar.projectKey=cbalderama_PersonalProject
sonar.organization=cbalderama

# Source directories (only what exists)
sonar.sources=apps/mobile/app,apps/mobile/components,apps/mobile/services,apps/mobile/types

# Test directories (only include if they exist)
sonar.tests=apps/mobile/services/__tests__

# Exclude files that shouldn't be analyzed
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.spec.ts,**/scripts/**,**/__mocks__/**,**/coverage/**,**/.expo/**,**/android/**,**/ios/**,**/dist/**

# Files to exclude from coverage calculation
sonar.coverage.exclusions=**/scripts/**,**/*.test.ts,**/*.spec.ts,**/app.json,**/eas.json,**/babel.config.js,**/metro.config.js,**/__mocks__/**

# Language
sonar.language=ts

# Quality Gate - MVP Standards
sonar.qualitygate.wait=true

# Project metadata
sonar.projectName=PersonalProject
sonar.projectVersion=1.0.0